<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NLP Graph Visualization Demo</title>
  <style>
    :root {
      --bg: #f2eee7;
      --surface: #fffefb;
      --ink: #20303d;
      --muted: #59697a;
      --accent: #0b7a75;
      --outline: #d4cfc6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #fff5db 0%, transparent 42%),
        radial-gradient(circle at 85% 0%, #d9f5ef 0%, transparent 38%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(1100px, 100%);
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(32, 48, 61, 0.12);
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--outline);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--outline);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

      .input-row {
        display: flex;
        gap: 8px;
        width: 100%;
        padding: 10px 20px;
        border-bottom: 1px solid var(--outline);
      }

      .text-input {
        flex: 1;
        border: 1px solid var(--outline);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 0.9rem;
        font-family: inherit;
        color: var(--ink);
        background: #fff;
        outline: none;
      }

      .text-input:focus {
        border-color: var(--accent);
      }

      .btn-accent {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .btn-accent:hover {
        background: #095f5b;
        border-color: #095f5b;
      }

      .btn-accent:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      min-height: clamp(420px, 72vh, 760px);
    }

    #graph-container {
      width: 100%;
      min-height: clamp(420px, 72vh, 760px);
      border-right: 1px solid var(--outline);
    }

    .details {
      padding: 14px;
      background: linear-gradient(180deg, #fffefb 0%, #f8f4ee 100%);
    }

    .details-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--ink);
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .meta strong {
      color: var(--ink);
      font-weight: 600;
      margin-right: 4px;
    }

    #detail-hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .footer {
      border-top: 1px solid var(--outline);
      padding: 10px 20px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 6px;
      border-radius: 999px;
      font-size: 0.78rem;
      border: 1px solid var(--outline);
      background: #fff;
    }

    .u { color: #d24d57; }
    .i { color: #d68b00; }
    .v { color: #2d9b56; }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      #graph-container {
        border-right: none;
        border-bottom: 1px solid var(--outline);
      }
    }
  </style>
</head>
<body>
  <section class="panel">
    <header class="header">
      <h1 class="title">NLP Translation Knowledge Graph</h1>
      <div class="actions">
        <p id="status" class="status">Initializing...</p>
        <button id="refresh-btn" class="btn" type="button">Refresh</button>
      </div>
    </header>

      <div class="input-row">
        <input
          id="text-input"
          class="text-input"
          type="text"
          placeholder="Type a sentence and press Resolve — e.g. The computer translates the language"
          autocomplete="off"
        />
        <button id="submit-btn" class="btn btn-accent" type="button">Resolve</button>
      </div>

    <div class="layout">
      <div id="graph-container"></div>
      <aside class="details">
        <h2 class="details-title">Node Inspector</h2>
        <div class="meta">
          <div><strong>Word:</strong><span id="detail-word">-</span></div>
          <div><strong>Language:</strong><span id="detail-language">-</span></div>
          <div><strong>Confidence:</strong><span id="detail-confidence">-</span></div>
          <div><strong>Domain:</strong><span id="detail-domain">-</span></div>
          <div><strong>Occurrences:</strong><span id="detail-occurrences">-</span></div>
        </div>
        <p id="detail-hint">Hover a node to inspect metadata.</p>
      </aside>
    </div>

    <footer class="footer">
      <span class="badge u">unknown</span>
      <span class="badge i">inferred</span>
      <span class="badge v">verified</span>
      Sample Sigma render from Graphing/sample-graph.json
    </footer>
  </section>

  <script src="./GraphVisualizer.js"></script>
  <script type="module" src="./app-entry.js"></script>
</body>
</html>
